<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link href="https://fonts.googleapis.com/css?family=Roboto:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic" rel="stylesheet" />    <title>Document</title>
</head>
<body>

    <div id="container">

        <h1>Color Palette Generator</h1>

        <button id="generate" onclick="generate()"> <i class="fas fa-sync-alt"></i>Generate Palette</button>
       
        <div id="palette">
            <div class="color-box">
                <div class="color" style="background-color:#e76060;"></div>
                <div class="color-info"> <span style="text-transform: uppercase;">#e76060</span>
                <i class="far fa-copy copy-btn"></i></div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color:#1b1bc6"></div>
                <div class="color-info"> <span style="text-transform: uppercase;">#1b1bc6</span>
                <i class="far fa-copy copy-btn"></i></div>
            </div>
            
            <div class="color-box">
                <div class="color" style="background-color:#17c864;"></div>
                <div class="color-info"> <span style="text-transform: uppercase;">#17c864</span>
                <i class="far fa-copy copy-btn"></i></div>
            </div>
           
            <div class="color-box">
                <div class="color" style="background-color:#f90095;"></div>
                <div class="color-info"> <span style="text-transform: uppercase;">#f90095</span>
                <i class="far fa-copy copy-btn"></i></div>
            </div>
            
            <div class="color-box">
                <div class="color" style="background-color:#d4ea0e;"></div>
                <div class="color-info"> <span style="text-transform: uppercase;">#d4ea0e</span>
                <i class="far fa-copy copy-btn"></i></div>
            </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
