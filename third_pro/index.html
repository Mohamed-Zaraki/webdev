<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
    <title>Document</title>

        <h1 id="title">Simple Kanban Board</h1>

        <div id="container-task">

                <ul>
                    <li draggable="true">Buy groceries</li>

                </ul>

            </div>

                </ul>
            </div>
            <div class="columns">
                 <h2>Done</h2>
                <ul></ul>
               
            </div>
        </div>


    </div>
    

    <script src="script.js"> </script>
</body>
</html>
